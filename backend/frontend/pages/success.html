<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Compra confirmada - NEXOPass</title>

  <link rel="icon" type="image/png" href="/assets/images/branding/favicon.png">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #0f0f12;
    }
  </style>

</head>

<header class="sticky top-0 z-50 bg-black/70 backdrop-blur border-b border-white/10">

  <div class="max-w-7xl mx-auto px-5 py-2 grid grid-cols-3 items-center">

    <!-- IZQUIERDA -->
    <button
      onclick="window.open('https://nexoesquel.com', '_blank')"
      class="justify-self-start bg-transparent border-0 p-0 hover:opacity-80 hover:scale-105 transform duration-200 transition"
    >
      <img
        src="/assets/images/branding/nexo_logo_transparente.png"
        class="h-14 w-auto"
      />
    </button>

    <!-- CENTRO VACÍO -->
    <div></div>

    <!-- DERECHA -->
    <a
      href="/index.html" class="justify-self-end hover:opacity-80 hover:scale-105 transform duration-200 transition"
    >
      <img src="/assets/images/branding/nexopass.png" alt="NEXOPass" class="h-28 w-auto">
    </a>

  </div>

</header>

<body class="text-white min-h-screen">

<main class="max-w-5xl mx-auto p-6">

  <div class="text-center mb-10">

    <h1 class="text-5xl font-extrabold text-green-400">
      🎉 Compra confirmada
    </h1>

    <p class="text-gray-400 mt-3 text-lg">
      Su ticket ya está listo - ¡Gracias por su compra! - Esperamos que disfrute del evento.
    </p>

  </div>

  <div id="estado" class="text-center text-yellow-400 text-xl mb-8">
    Cargando ticket...
  </div>

  <div id="eventoBox" class="hidden mb-10"></div>

  <div
    id="ticketsContainer"
    class="flex justify-center items-center"
  ></div>

</main>

<footer class="border-t border-white/10 py-6 text-center text-sm text-gray-500">
  © 2026 NEXOPass - Todos los derechos reservados
</footer>

<script type="module">

const API = window.location.origin;

const estado =
  document.getElementById("estado");

const ticketsContainer =
  document.getElementById("ticketsContainer");

const eventoBox =
  document.getElementById("eventoBox");

/**
 * 🔥 GET ORDEN ID
 */
const params =
  new URLSearchParams(window.location.search);

const ordenId =
  params.get("orden_id");

if (!ordenId) {

  estado.innerHTML =
    "❌ Orden no encontrada";

  throw new Error("Missing orden_id");
}

/**
 * 🖼️ NORMALIZAR IMAGEN
 */
function getImagen(img) {

  const fallback =
    "/assets/images/events/nexo_back.jpg";

  if (!img || typeof img !== "string") {
    return fallback;
  }

  if (img.startsWith("http")) {
    return img;
  }

  if (img.startsWith("/assets/")) {
    return img;
  }

  if (!img.includes("/")) {
    return `/assets/images/events/${img}`;
  }

  return fallback;
}

/**
 * 📡 CARGAR ORDEN + WAIT WEBHOOK
 */
async function cargarOrden() {

  let data = null;

  for (let i = 0; i < 20; i++) {

    estado.innerHTML =
      `🎟️ Generando ticket... (${i + 1}/20)`;

    try {

      const res =
        await fetch(`${API}/api/orden/${ordenId}`);

      const json = await res.json();

      if (json?.ok) {

        data = json;

        if (json.tickets?.length) {
          break;
        }
      }

    } catch (err) {
      console.error(err);
    }

    await new Promise(r => setTimeout(r, 1500));
  }

  /**
   * ❌ FAIL
   */
  if (!data?.tickets?.length) {

    estado.innerHTML =
      "❌ Ticket no generado";

    return;
  }

  /**
   * ✅ SUCCESS
   */
  estado.innerHTML =
    "✅ Ticket generado correctamente";

  renderEvento(data.orden);

  renderTickets(data.tickets, data.orden);
}

/**
 * 🎟️ EVENTO
 */
function renderEvento(orden) {

  if (!orden?.evento_id) return;

  const evento =
    orden.evento_id;

  const imagen =
    getImagen(evento.imagen);

  const fecha =
    new Date(evento.fecha)
      .toLocaleDateString("es-AR");

  const hora =
    evento.hora ||

    new Date(evento.fecha)
      .toLocaleTimeString(
        "es-AR",
        {
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        }
      ) + " hs";

  eventoBox.classList.remove("hidden");

  eventoBox.innerHTML = `

    <div class="bg-gray-900 border border-white/10 rounded-3xl overflow-hidden">

      <img
        src="${imagen}"
        class="w-full h-72 object-cover"
        onerror="this.src='/assets/images/events/nexo_back.jpg'"
      />

      <div class="p-8">

        <h2 class="text-4xl font-extrabold">
          ${evento.nombre}
        </h2>

        <div class="mt-4 space-y-3 text-gray-400">

          <div>
            📅 ${fecha}
          </div>

          <div>
            🕒 ${hora}
          </div>

          <div>
            📍 ${evento.lugar || "Lugar a confirmar"}
          </div>

          <div>
            📌 ${evento.direccion || ""}
          </div>

          <div>
            🌎 ${evento.localidad || ""}
          </div>

        </div>

      </div>

    </div>
  `;
}

/**
 * 🎫 TICKETS
 */
function renderTickets(tickets, orden) {

  ticketsContainer.innerHTML = "";

  const t = tickets[0];

  if (!t) return;

  const itemOrden =
    orden.items?.find(
      i => i.tipo === t.tipo
    );

  const cantidad =
    itemOrden?.cantidad || 1;

  const card =
    document.createElement("div");

  card.className =
    "bg-gray-900 border border-white/10 rounded-3xl p-8 text-center w-full max-w-xl";

  card.innerHTML = `

    <h3 class="text-3xl font-bold text-purple-400">
      ${t.tipo}
    </h3>

    <p class="text-gray-400 mt-3">
      ${cantidad} entrada(s)
    </p>

    <p class="text-gray-500 mt-2 text-sm break-all">
      ID: ${t._id}
    </p>

    <img
      src="${t.qr_code}"
      class="w-56 h-56 mx-auto mt-8 bg-white p-3 rounded-2xl"
    />

    <button
      onclick="descargarPDF('${t._id}')"
      class="mt-8 w-full bg-purple-600 hover:bg-purple-700 transition py-4 rounded-2xl font-bold"
    >
      Descargar Ticket PDF
    </button>

  `;

  ticketsContainer.appendChild(card);
}

/**
 * 📄 PDF
 */
window.descargarPDF = function(id) {

  window.open(
    `${API}/api/orden/ticket/${id}/pdf`,
    "_blank"
  );
};

cargarOrden();

</script>

</body>
</html>
