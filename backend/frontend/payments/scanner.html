<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>NEXO Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f10;
      color: white;
      font-family: Arial;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    #reader {
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid #333;
    }

    .result {
      margin-top: 20px;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      display: none;
    }

    .success {
      background: #00d26a;
      color: black;
    }

    .error {
      background: #ff3b3b;
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>🎟️ NEXO Scanner</h1>

    <div id="reader"></div>

    <div id="result" class="result"></div>

  </div>

<script>

  const API_URL = window.location.origin;

  const resultBox = document.getElementById("result");

  let scanning = true;

  /**
   * 📢 UI RESULTADO
   */
  function mostrarResultado(mensaje, tipo) {

    resultBox.style.display = "block";
    resultBox.className = `result ${tipo}`;
    resultBox.innerHTML = mensaje;

  }

  /**
   * 📡 VALIDAR TICKET
   */
  async function validarTicket(ticketId) {

    try {

      const response = await fetch(
        `${API_URL}/api/ticket/validar`,
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ ticketId })
        }
      );

      const data = await response.json();

      if (data.ok) {

        mostrarResultado("✅ ACCESO PERMITIDO", "success");

        if (navigator.vibrate) {
          navigator.vibrate(200);
        }

      } else {

        mostrarResultado("❌ " + (data.message || "Denegado"), "error");

        if (navigator.vibrate) {
          navigator.vibrate([200, 100, 200]);
        }
      }

    } catch (error) {

      console.error(error);

      mostrarResultado("❌ Error servidor", "error");

    }
  }

  /**
   * 📷 SCAN
   */
  async function onScanSuccess(decodedText) {

    if (!scanning) return;

    scanning = false;

    try {

      const data = JSON.parse(decodedText);

      if (!data.ticketId) {

        mostrarResultado("❌ QR inválido", "error");

        setTimeout(() => scanning = true, 3000);

        return;
      }

      await validarTicket(data.ticketId);

    } catch (error) {

      mostrarResultado("❌ QR corrupto", "error");
    }

    setTimeout(() => {
      scanning = true;
    }, 3000);
  }

  /**
   * 📷 INIT CAMERA
   */
  const html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras()
    .then(devices => {

      if (!devices || devices.length === 0) {
        mostrarResultado("❌ No se encontró cámara", "error");
        return;
      }

      const cameraId = devices[0].id;

      return html5QrCode.start(
        cameraId,
        { fps: 10, qrbox: 250 },
        onScanSuccess
      );

    })
    .catch(err => {
      console.error(err);
      mostrarResultado("❌ Error iniciando cámara", "error");
    });

</script>

</body>
</html>
