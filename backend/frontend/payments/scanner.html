<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>NEXO Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f10;
      color: white;
      font-family: Arial;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    #reader {
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid #333;
    }

    .result {
      margin-top: 20px;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      display: none;
    }

    .success {
      background: #00d26a;
      color: black;
    }

    .error {
      background: #ff3b3b;
    }

    .details-card {
      margin-top: 16px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      display: none;
      text-align: left;
    }

    .details-card h2 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #fff;
    }

    .details-card p {
      margin: 6px 0;
      color: #e8e8e8;
      font-size: 14px;
    }

    .accept-btn {
      margin-top: 14px;
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 999px;
      background: #fff;
      color: #111;
      font-weight: bold;
      cursor: pointer;
      display: none;
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>🎟️ NEXO Scanner</h1>

    <div id="reader"></div>

    <div id="result" class="result"></div>

    <div id="detailsCard" class="details-card"></div>

    <button id="acceptBtn" class="accept-btn">Aceptar</button>

  </div>

<script>

  const API_URL = window.location.origin;

  const resultBox = document.getElementById("result");
  const detailsCard = document.getElementById("detailsCard");
  const acceptBtn = document.getElementById("acceptBtn");

  let scanning = true;
  let lastTicketSummary = null;

  /**
   * 📢 UI RESULTADO
   */
  function mostrarResultado(mensaje, tipo) {

    resultBox.style.display = "block";
    resultBox.className = `result ${tipo}`;
    resultBox.innerHTML = mensaje;

  }

  function mostrarError(mensaje) {
    mostrarResultado(`❌ ${mensaje}`, "error");
    acceptBtn.style.display = "block";
  }

  function resetScannerUI() {
    detailsCard.style.display = "none";
    detailsCard.innerHTML = "";
    acceptBtn.style.display = "none";
    resultBox.style.display = "none";
    resultBox.innerHTML = "";
  }

  function mostrarDetalle(ticketData) {
    if (!ticketData) return;

    const evento = ticketData.evento || {};
    const cliente = ticketData.cliente || {};

    detailsCard.innerHTML = `
      <h2>Datos de la entrada</h2>
      <p><strong>Evento:</strong> ${evento.nombre || "-"}</p>
      <p><strong>Fecha:</strong> ${evento.fecha || "-"}</p>
      <p><strong>Lugar:</strong> ${evento.lugar || "-"}</p>
      <p><strong>Nombre:</strong> ${cliente.nombreCompleto || "-"}</p>
      <p><strong>DNI:</strong> ${cliente.dni || "-"}</p>
      <p><strong>Tipo de entrada:</strong> ${ticketData.tipoEntrada || "-"}</p>
      <p><strong>Cantidad de tickets:</strong> ${ticketData.cantidadTickets || 1}</p>
    `;

    detailsCard.style.display = "block";
    acceptBtn.style.display = "block";
  }

  function prepararSiguienteEscaneo() {
    resetScannerUI();
    scanning = true;
    lastTicketSummary = null;
  }

  /**
   * 📡 VALIDAR TICKET
   */
  async function validarTicket(ticketId) {

    try {

      const response = await fetch(
        `${API_URL}/api/ticket/validar`,
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ ticketId })
        }
      );

      const data = await response.json();

      if (data.ok) {

        mostrarResultado("✅ ACCESO PERMITIDO", "success");
        lastTicketSummary = data.data;
        mostrarDetalle(lastTicketSummary);
        acceptBtn.style.display = "block";

        if (navigator.vibrate) {
          navigator.vibrate(200);
        }

      } else {

        mostrarError(data.message || "Denegado");

        if (navigator.vibrate) {
          navigator.vibrate([200, 100, 200]);
        }
      }

    } catch (error) {

      console.error(error);

      mostrarResultado("❌ Error servidor", "error");

    }
  }

  /**
   * 📷 SCAN
   */
  async function onScanSuccess(decodedText) {

    if (!scanning) return;

    scanning = false;

    try {

      const data = JSON.parse(decodedText);

      if (!data.ticketId) {

        mostrarError("QR inválido");
        return;
      }

      await validarTicket(data.ticketId);

    } catch (error) {

      mostrarError("QR corrupto");
    }
  }

  acceptBtn.addEventListener("click", () => {
    prepararSiguienteEscaneo();
  });

  /**
   * 📷 INIT CAMERA
   */
  const html5QrCode = new Html5Qrcode("reader");

  function startScanner() {
    html5QrCode.start(
      { facingMode: "environment" },
      { 
        fps: 10, 
        qrbox: 250 
      },
      onScanSuccess
    )
      .catch(err => {
        console.error(err);
        mostrarResultado("❌ Error iniciando cámara", "error");
      });
  }

  startScanner();

</script>

</body>
</html>
