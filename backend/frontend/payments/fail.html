<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Pago rechazado - NEXOPass</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #0f0f12;
      color: white;
      font-family: Arial;
    }
  </style>

</head>

<body class="min-h-screen flex items-center justify-center px-5">

  <div class="max-w-md w-full text-center">

    <!-- ICON -->
    <div class="text-7xl mb-6">
      ❌
    </div>

    <!-- TITLE -->
    <h1 class="text-4xl font-extrabold text-red-500">
      Pago rechazado
    </h1>

    <!-- MESSAGE -->
    <p class="text-gray-400 mt-6 text-lg leading-relaxed">

      No pudimos procesar tu pago.
      Podés intentarlo nuevamente o usar otro método.

    </p>

    <!-- INFO BOX -->
    <div class="mt-8 bg-gray-900 border border-white/10 rounded-2xl p-6 text-left">

      <p class="text-sm text-gray-500">
        Posibles causas:
      </p>

      <ul class="mt-3 space-y-2 text-gray-300 text-sm">

        <li>• Fondos insuficientes</li>
        <li>• Datos incorrectos</li>
        <li>• Pago rechazado por el banco</li>
        <li>• Error temporal del sistema</li>

      </ul>

    </div>

    <!-- ACTIONS -->
    <div class="mt-10 flex flex-col gap-4">

      <button
        onclick="history.back()"
        class="bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-2xl transition"
      >
        Intentar nuevamente
      </button>

      <button
        onclick="window.location.href='/'"
        class="bg-gray-800 hover:bg-gray-700 py-4 rounded-2xl font-bold transition"
      >
        Volver al inicio
      </button>

    </div>

  </div>

</body>
</html>
