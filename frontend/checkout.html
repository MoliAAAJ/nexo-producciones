<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout - NEXO</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">

  <div class="w-full max-w-lg bg-gray-800 p-6 rounded-2xl shadow-lg">

    <h1 class="text-2xl font-bold text-purple-400 mb-4">
      Finalizar compra
    </h1>

    <!-- RESUMEN -->
    <div class="mb-6 p-4 bg-gray-700 rounded-lg">
      <p class="text-gray-300">Evento:</p>
      <p id="eventoNombre" class="font-semibold"></p>

      <p class="text-gray-300 mt-2">Total:</p>
      <p class="font-bold text-green-400">
        $<span id="total"></span>
      </p>
    </div>

    <!-- FORM -->
    <div class="space-y-3">

      <input id="nombre" placeholder="Nombre" class="w-full p-2 rounded bg-gray-700"/>
      <input id="apellido" placeholder="Apellido" class="w-full p-2 rounded bg-gray-700"/>
      <input id="dni" placeholder="DNI" class="w-full p-2 rounded bg-gray-700"/>
      <input id="email" placeholder="Email" type="email" class="w-full p-2 rounded bg-gray-700"/>

    </div>

    <!-- TERMS -->
    <div class="mt-4 text-sm text-gray-400">
      <label class="flex items-center gap-2">
        <input type="checkbox" id="terms"/>
        Acepto los términos y condiciones
      </label>
    </div>

    <!-- BUTTON -->
    <button id="pagarBtn"
      class="w-full mt-6 bg-purple-600 hover:bg-purple-700 py-2 rounded-lg font-semibold">

      Continuar al pago

    </button>

  </div>

<script>

  const API =
    window.location.hostname === "localhost"
      ? "http://localhost:3000"
      : "https://earthlike-drinking-unmarked.ngrok-free.dev";

  const orden =
    JSON.parse(localStorage.getItem("orden_temp") || "{}");

  document.getElementById("eventoNombre").innerText =
    orden.eventoNombre || "Evento";

  document.getElementById("total").innerText =
    orden.total || "0";

  const btn =
    document.getElementById("pagarBtn");

  btn.onclick = async () => {

    const nombre =
      document.getElementById("nombre").value;

    const apellido =
      document.getElementById("apellido").value;

    const dni =
      document.getElementById("dni").value;

    const email =
      document.getElementById("email").value;

    const terms =
      document.getElementById("terms").checked;

    if (!nombre || !apellido || !dni || !email) {
      alert("Completa todos los campos");
      return;
    }

    if (!terms) {
      alert("Debes aceptar los términos");
      return;
    }

    btn.disabled = true;
    btn.innerText = "Procesando...";

    try {

      const res = await fetch("http://localhost:3000/api/orden", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          evento_id: orden.eventoId,
          items: [
            {
              tipo: orden.tipo,
              cantidad: orden.cantidad
            }
          ],
          cliente: {
            nombre,
            apellido,
            dni,
            email
          }
        })
      });

      const data = await res.json();

      if (!data.ok) {
        throw new Error(data.error || "Error");
      }

      localStorage.removeItem("orden_temp");

      window.location.href = data.init_point;

    } catch (err) {

      console.error(err);

      alert("Error creando orden");

      btn.disabled = false;
      btn.innerText = "Continuar al pago";

    }

  };

</script>

</body>
</html>
