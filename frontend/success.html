<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>NEXO • Tickets</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, Helvetica, sans-serif;
      background:#0f0f10;
      color:white;
      min-height:100vh;
      padding:40px 20px;
    }

    .container{
      max-width:1000px;
      margin:auto;
    }

    .hero{
      text-align:center;
      margin-bottom:40px;
    }

    .hero h1{
      font-size:48px;
      margin-bottom:10px;
    }

    .hero p{
      color:#b3b3b3;
      font-size:18px;
    }

    .success{
      color:#00d26a;
    }

    .orden-card{
      background:#18181b;
      border:1px solid #2a2a2f;
      border-radius:20px;
      padding:30px;
      margin-bottom:30px;
    }

    .orden-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-top:20px;
    }

    .info-box{
      background:#111114;
      border-radius:14px;
      padding:18px;
    }

    .info-box span{
      display:block;
      color:#8f8f95;
      font-size:14px;
      margin-bottom:8px;
    }

    .info-box strong{
      font-size:18px;
    }

    .tickets-title{
      margin-bottom:20px;
      font-size:30px;
    }

    .tickets-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:25px;
    }

    .ticket{
      background:linear-gradient(
        135deg,
        #18181b,
        #111114
      );

      border:1px solid #2a2a2f;

      border-radius:24px;

      overflow:hidden;

      position:relative;

      transition:0.25s;
    }

    .ticket:hover{
      transform:translateY(-4px);
      border-color:#444;
    }

    .ticket-top{
      padding:25px;
      border-bottom:1px dashed #333;
    }

    .ticket-top h3{
      font-size:26px;
      margin-bottom:10px;
    }

    .ticket-type{
      display:inline-block;
      background:#00d26a20;
      color:#00d26a;
      padding:8px 14px;
      border-radius:999px;
      font-size:14px;
      font-weight:bold;
    }

    .ticket-body{
      padding:25px;
      text-align:center;
    }

    .ticket-body img{
      width:220px;
      background:white;
      padding:14px;
      border-radius:16px;
      margin-bottom:20px;
    }

    .qr-text{
      color:#9a9aa3;
      font-size:14px;
      word-break:break-all;
    }

    .footer{
      margin-top:50px;
      text-align:center;
      color:#666;
      font-size:14px;
    }

    .loader{
      text-align:center;
      margin-top:80px;
      color:#999;
      font-size:20px;
    }

    @media(max-width:768px){

      .hero h1{
        font-size:36px;
      }

      .ticket-body img{
        width:180px;
      }

    }

  </style>
</head>
<body>

  <div class="container">

    <div class="hero">
      <h1 class="success">✅ Pago aprobado</h1>

      <p>
        Tus entradas fueron generadas correctamente
      </p>
    </div>

    <div id="contenido">

      <div class="loader">
        Cargando tickets...
      </div>

    </div>

    <div class="footer">
      NEXO Tickets • Powered by MercadoPago
    </div>

  </div>

  <script>

    const params = new URLSearchParams(window.location.search);

    const ordenId = params.get("orden_id");

    async function cargarOrden(){

      try{

        const response = await fetch(
          `http://localhost:3000/api/orden/${ordenId}`
        );

        const data = await response.json();

        const contenido = document.getElementById("contenido");

        contenido.innerHTML = `

          <div class="orden-card">

            <h2>🧾 Resumen de compra</h2>

            <div class="orden-grid">

              <div class="info-box">
                <span>Orden</span>
                <strong>${data.orden._id}</strong>
              </div>

              <div class="info-box">
                <span>Total pagado</span>
                <strong>$${data.orden.total}</strong>
              </div>

              <div class="info-box">
                <span>Estado</span>
                <strong>${data.orden.estado}</strong>
              </div>

              <div class="info-box">
                <span>Cliente</span>
                <strong>
                  ${data.orden.cliente.nombre}
                  ${data.orden.cliente.apellido}
                </strong>
              </div>

            </div>

          </div>

          <h2 class="tickets-title">
            🎟️ Tus Tickets
          </h2>

          <div class="tickets-grid" id="tickets-grid"></div>

        `;

        const ticketsGrid = document.getElementById("tickets-grid");

        data.tickets.forEach(ticket => {

          ticketsGrid.innerHTML += `

            <div class="ticket">

              <div class="ticket-top">

                <h3>NEXO EVENT</h3>

                <div class="ticket-type">
                  ${ticket.tipo}
                </div>

              </div>

              <div class="ticket-body">

                <img src="${ticket.qr_code}" />

                <div class="qr-text">
                  ${ticket.qr_code}
                </div>

              </div>

            </div>

          `;

        });

      }catch(error){

        console.error(error);

        document.getElementById("contenido").innerHTML = `
          <div class="orden-card">
            <h2>❌ Error cargando tickets</h2>
          </div>
        `;

      }

    }

    cargarOrden();

  </script>

</body>
</html>
