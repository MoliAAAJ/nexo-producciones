<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Compra confirmada - NEXO Tickets</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>

    * {
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #0f0f12;
    }

  </style>

</head>

<body class="text-white min-h-screen flex flex-col">

  <!-- HEADER -->

  <header class="sticky top-0 z-50 bg-black/70 backdrop-blur border-b border-white/10">

    <div class="max-w-7xl mx-auto px-5 py-4 flex items-center justify-between">

      <img
        src="/assets/logo.png"
        alt="NEXO"
        class="h-24 w-auto"
      />

      <button
        onclick="window.location.href='/'"
        class="bg-purple-600 hover:bg-purple-700 transition px-5 py-2 rounded-xl font-semibold text-sm"
      >
        Inicio
      </button>

      <h1 class="text-xl font-extrabold tracking-wide text-purple-400">

        NEXO
        <span class="text-white">
          Tickets
        </span>

      </h1>

    </div>

  </header>

  <!-- CONTENT -->

  <main class="flex-1 px-5 py-16">

    <div class="max-w-5xl mx-auto">

      <!-- SUCCESS -->

      <div class="bg-gray-900 border border-white/10 rounded-3xl p-10">

        <div class="text-center">

          <div class="text-7xl mb-6">
            🎉
          </div>

          <h1 class="text-5xl font-extrabold text-green-400">

            ¡Compra confirmada!

          </h1>

          <p class="text-gray-400 text-xl mt-6 max-w-2xl mx-auto leading-relaxed">

            Gracias por tu compra.
            Tus entradas fueron generadas correctamente.

          </p>

        </div>

        <!-- INFO -->

        <div class="grid md:grid-cols-2 gap-6 mt-12">

          <div class="bg-black/30 border border-white/10 rounded-2xl p-6">

            <h2 class="text-xl font-bold text-purple-400 mb-4">

              Información importante

            </h2>

            <ul class="space-y-3 text-gray-300 leading-relaxed">

              <li>
                ✅ Se enviará comprobante por mail
              </li>

              <li>
                ✅ Presentarse con DNI
              </li>

              <li>
                ✅ Llegar 15 minutos antes
              </li>

              <li>
                ✅ Mostrar QR en boletería
              </li>

            </ul>

          </div>

          <div class="bg-black/30 border border-white/10 rounded-2xl p-6">

            <h2 class="text-xl font-bold text-purple-400 mb-4">

              Estado

            </h2>

            <div
              id="estadoCarga"
              class="text-lg text-yellow-400"
            >

              Generando tickets...

            </div>

          </div>

        </div>

        <!-- EVENTO -->

        <div
          id="eventoBox"
          class="hidden mt-10 bg-black/30 border border-white/10 rounded-3xl overflow-hidden"
        >

          <img
            id="eventoImagen"
            class="w-full h-72 object-cover"
          />

          <div class="p-8">

            <h2
              id="eventoNombre"
              class="text-4xl font-extrabold"
            ></h2>

            <div class="mt-6 grid md:grid-cols-3 gap-4 text-gray-300">

              <div id="eventoFecha"></div>

              <div id="eventoHora"></div>

              <div id="eventoLugar"></div>

            </div>

          </div>

        </div>

        <!-- TICKETS -->

        <div class="mt-12">

          <h2 class="text-3xl font-extrabold mb-8">

            Tus entradas

          </h2>

          <div
            id="ticketsContainer"
            class="grid md:grid-cols-2 gap-6"
          ></div>

        </div>

        <!-- ACTIONS -->

        <div class="mt-12 flex flex-col md:flex-row gap-4">

          <button
            onclick="window.location.href='/'"
            class="flex-1 bg-gray-800 hover:bg-gray-700 transition py-5 rounded-2xl font-bold text-lg"
          >

            Volver al inicio

          </button>

        </div>

      </div>

    </div>

  </main>

<script>

  const API_URL =
    window.location.origin;

  async function cargarOrden() {

    try {

      const params =
        new URLSearchParams(
          window.location.search
        );

      const ordenId =
        params.get("orden_id");

      if (!ordenId) {

        throw new Error(
          "Orden inválida"
        );

      }

      let intentos = 0;

      let data = null;

      while (intentos < 30) {

        console.log(
          `Intento ${intentos + 1}`
        );

        document.getElementById(
          "estadoCarga"
        ).innerText =

          `Generando tickets... (${intentos + 1}/30)`;

        const response = await fetch(

          `${API_URL}/api/orden/${ordenId}`

        );

        if (response.ok) {

          data = await response.json();

          if (
            data.tickets &&
            data.tickets.length > 0
          ) {

            break;

          }

        }

        await new Promise(resolve =>
          setTimeout(resolve, 2000)
        );

        intentos++;

      }

      if (
        !data ||
        !data.tickets ||
        data.tickets.length === 0
      ) {

        throw new Error(
          "Tickets todavía no generados"
        );

      }

      document.getElementById(
        "estadoCarga"
      ).innerHTML = `

        <span class="text-green-400">

          ✅ Tickets generados correctamente

        </span>

      `;

      const orden =
        data.orden;

      // 🔥 EVENTO

      if (orden.evento_id) {

        document
          .getElementById("eventoBox")
          .classList.remove("hidden");

        document.getElementById(
          "eventoNombre"
        ).innerText =

          orden.evento_id.nombre ||
          "Evento";

        document.getElementById(
          "eventoImagen"
        ).src =

          orden.evento_id.imagen ||
          "";

        const fecha =
          orden.evento_id.fecha
          ? new Date(
              orden.evento_id.fecha
            ).toLocaleDateString("es-AR")
          : "Fecha a confirmar";

        document.getElementById(
          "eventoFecha"
        ).innerHTML =

          `📅 ${fecha}`;

        document.getElementById(
          "eventoHora"
        ).innerHTML =

          `🕒 ${
            orden.evento_id.hora ||
            "Horario a confirmar"
          }`;

        document.getElementById(
          "eventoLugar"
        ).innerHTML =

          `📍 ${
            orden.evento_id.lugar ||
            "Lugar a confirmar"
          }`;

      }

      // 🔥 TICKETS

      const cont =
        document.getElementById(
          "ticketsContainer"
        );

      cont.innerHTML = "";

      data.tickets.forEach(ticket => {

        cont.innerHTML += `

          <div class="bg-black/30 border border-white/10 rounded-3xl p-6">

            <div class="flex items-center justify-between">

              <div>

                <div class="text-sm text-gray-500">

                  Ticket

                </div>

                <div class="text-xl font-bold text-purple-400">

                  ${ticket.tipo}

                </div>

              </div>

              <div class="bg-green-500/20 text-green-400 px-4 py-2 rounded-full text-sm font-semibold">

                Confirmado

              </div>

            </div>

            <div class="mt-6">

              <img
                src="${ticket.qr_code}"
                class="w-52 h-52 mx-auto rounded-2xl bg-white p-3"
              />

            </div>

            <button
              onclick="descargarPDF('${ticket._id}')"
              class="mt-8 w-full bg-purple-600 hover:bg-purple-700 transition py-4 rounded-2xl font-bold text-lg"
            >

              Descargar PDF

            </button>

          </div>

        `;

      });

    } catch (error) {

      console.error(error);

      document.body.innerHTML = `

        <div class="min-h-screen flex items-center justify-center bg-black text-white px-5">

          <div class="text-center max-w-xl">

            <div class="text-7xl mb-6">
              ⚠️
            </div>

            <h1 class="text-5xl font-extrabold text-red-500">

              Error cargando tickets

            </h1>

            <p class="mt-6 text-gray-400 text-xl leading-relaxed">

              Intentá nuevamente en unos segundos.

            </p>

            <button
              onclick="location.reload()"
              class="mt-10 bg-purple-600 hover:bg-purple-700 transition px-8 py-5 rounded-2xl font-bold text-lg"
            >

              Reintentar

            </button>

          </div>

        </div>

      `;

    }

  }

  function descargarPDF(ticketId) {

    window.open(

      `${API_URL}/api/ticket/${ticketId}/pdf`,

      "_blank"

    );

  }

  cargarOrden();

</script>

</body>
</html>
