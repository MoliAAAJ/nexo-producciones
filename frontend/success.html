<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEXO • Tickets</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:#0f0f10;
      color:white;
      min-height:100vh;
      padding:40px 20px;
    }

    .container{
      max-width:1000px;
      margin:auto;
    }

    .hero{
      text-align:center;
      margin-bottom:40px;
    }

    .hero h1{
      font-size:48px;
      margin-bottom:10px;
    }

    .hero p{
      color:#b3b3b3;
      font-size:18px;
    }

    .success{
      color:#00d26a;
    }

    .orden-card{
      background:#18181b;
      border:1px solid #2a2a2f;
      border-radius:20px;
      padding:30px;
      margin-bottom:30px;
    }

    .orden-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-top:20px;
    }

    .info-box{
      background:#111114;
      border-radius:14px;
      padding:18px;
    }

    .info-box span{
      display:block;
      color:#8f8f95;
      font-size:14px;
      margin-bottom:8px;
    }

    .info-box strong{
      font-size:18px;
    }

    .tickets-title{
      margin-bottom:20px;
      font-size:30px;
    }

    .tickets-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:25px;
    }

    .ticket{
      background:linear-gradient(135deg,#18181b,#111114);
      border:1px solid #2a2a2f;
      border-radius:24px;
      overflow:hidden;
      transition:0.25s;
    }

    .ticket:hover{
      transform:translateY(-4px);
      border-color:#444;
    }

    .ticket-top{
      padding:25px;
      border-bottom:1px dashed #333;
    }

    .ticket-top h3{
      font-size:26px;
      margin-bottom:10px;
    }

    .ticket-type{
      display:inline-block;
      background:#00d26a20;
      color:#00d26a;
      padding:8px 14px;
      border-radius:999px;
      font-size:14px;
      font-weight:bold;
    }

    .ticket-body{
      padding:25px;
      text-align:center;
    }

    .ticket-body img{
      width:220px;
      background:white;
      padding:14px;
      border-radius:16px;
      margin-bottom:20px;
    }

    .qr-text{
      color:#9a9aa3;
      font-size:14px;
      word-break:break-all;
      margin-bottom:10px;
    }

    .footer{
      margin-top:50px;
      text-align:center;
      color:#666;
      font-size:14px;
    }

    .loader{
      text-align:center;
      margin-top:80px;
      color:#999;
      font-size:20px;
    }

    @media(max-width:768px){

      .hero h1{
        font-size:36px;
      }

      .ticket-body img{
        width:180px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="hero">

      <h1 class="success">
        ✅ Pago aprobado
      </h1>

      <p>
        Tus entradas fueron generadas correctamente
      </p>

    </div>

    <div id="contenido">

      <div class="loader">
        Cargando tickets...
      </div>

    </div>

    <div class="footer">
      NEXO Tickets • Powered by MercadoPago
    </div>

  </div>

<script>

  const API =
    window.location.hostname === "localhost"
      ? "http://localhost:3000"
      : "https://earthlike-drinking-unmarked.ngrok-free.dev";

  const params =
    new URLSearchParams(window.location.search);

  const ordenId =
    localStorage.getItem("orden_id") ||
    params.get("orden_id");

  if (!ordenId || ordenId === "null") {

    document.body.innerHTML = `
      <div style="
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        background:#111827;
        color:white;
        font-family:sans-serif;
        flex-direction:column;
        gap:20px;
      ">
        <h1>⚠ Orden no encontrada</h1>
        <a href="index.html"
          style="
            background:#9333ea;
            color:white;
            padding:12px 20px;
            border-radius:12px;
            text-decoration:none;
          ">
          Volver al inicio
        </a>
      </div>
    `;

    throw new Error("orden_id inválido");

  }

  async function cargarOrden(){

    try {

      let data = null;

      const maxIntentos = 8;

      for (let i = 0; i < maxIntentos; i++) {

        const res = await fetch(
          `${API}/api/orden/${ordenId}`
        );

        data = await res.json();

        if (data?.tickets?.length > 0) break;

        await new Promise(r => setTimeout(r, 1500));

      }

      if (!data || !data.orden) {
        throw new Error("Orden no disponible");
      }

      const contenido =
        document.getElementById("contenido");

      contenido.innerHTML = `
        <div class="orden-card">

          <h2>🧾 Resumen de compra</h2>

          <div class="orden-grid">

            <div class="info-box">
              <span>Orden</span>
              <strong>${data.orden._id}</strong>
            </div>

            <div class="info-box">
              <span>Total pagado</span>
              <strong>$${data.orden.total}</strong>
            </div>

            <div class="info-box">
              <span>Estado</span>
              <strong>${data.orden.estado}</strong>
            </div>

            <div class="info-box">
              <span>Cliente</span>
              <strong>
                ${data.orden.cliente.nombre}
                ${data.orden.cliente.apellido}
              </strong>
            </div>

          </div>

        </div>

        <h2 class="tickets-title">🎟️ Tus Tickets</h2>

        <div class="tickets-grid" id="tickets-grid"></div>
      `;

      const grid =
        document.getElementById("tickets-grid");

      data.tickets.forEach(ticket => {

        grid.innerHTML += `
          <div class="ticket">

            <div class="ticket-top">
              <h3>NEXO EVENT</h3>
              <div class="ticket-type">
                ${ticket.tipo}
              </div>
            </div>

            <div class="ticket-body">

              <img src="${ticket.qr_code}" alt="QR Ticket"/>

              <div class="qr-text">
                Presentar este QR en el ingreso
              </div>

              <a href="${API}/api/ticket/${ticket._id}/pdf"
                target="_blank"
                style="
                  display:inline-block;
                  margin-top:20px;
                  background:#00d26a;
                  color:black;
                  padding:12px 20px;
                  border-radius:12px;
                  text-decoration:none;
                  font-weight:bold;
                ">
                ⬇ Descargar PDF
              </a>

            </div>

          </div>
        `;

      });

    } catch (err) {

      console.error(err);

      document.getElementById("contenido").innerHTML = `
        <div class="orden-card">
          <h2>❌ Error cargando tickets</h2>
        </div>
      `;

    }

  }

  cargarOrden();

</script>

</body>
</html>
