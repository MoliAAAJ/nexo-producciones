<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin Pro NEXO</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white p-6">

  <h1 class="text-3xl font-bold text-purple-400 mb-6">
    Admin Pro NEXO
  </h1>

  <button
    onclick="cargarTodo()"
    class="bg-purple-600 hover:bg-purple-700 transition px-4 py-2 rounded mb-6"
  >
    Refrescar
  </button>

  <div id="loading" class="text-gray-400 mb-4">
    Cargando datos...
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>

  <h2 class="text-xl mb-2">Eventos</h2>
  <div id="eventos" class="mb-8"></div>

  <h2 class="text-xl mb-2">Tickets</h2>
  <div id="tickets"></div>

<script>

const API = window.location.origin;

function setLoading(state) {
  document.getElementById("loading").style.display =
    state ? "block" : "none";
}

async function cargarTodo() {

  try {

    setLoading(true);

    const [dashRes, eventosRes, ticketsRes] = await Promise.all([
      fetch(`${API}/api/admin/dashboard`),
      fetch(`${API}/api/admin/eventos`),
      fetch(`${API}/api/admin/tickets?usados=false`)
    ]);

    const dash = await dashRes.json().catch(() => ({}));
    const eventos = await eventosRes.json().catch(() => ({}));
    const tickets = await ticketsRes.json().catch(() => ({}));

    renderDashboard(dash?.data || {});
    renderEventos(eventos?.data || []);
    renderTickets(tickets?.tickets || []);

  } catch (error) {

    console.error(error);
    alert("Error cargando panel admin");

  } finally {
    setLoading(false);
  }
}

function renderDashboard(d = {}) {

  document.getElementById("dashboard").innerHTML = `
    ${card("Órdenes", d.totalOrdenes)}
    ${card("Tickets", d.ticketsTotal)}
    ${card("Usados", d.ticketsUsados)}
    ${card("Ingresos", "$" + (d.ingresos || 0), "text-green-400")}
  `;
}

function card(title, value, extra = "") {
  return `
    <div class="bg-gray-800 p-4 rounded-2xl border border-white/10">
      <p class="text-gray-400">${title}</p>
      <b class="text-3xl ${extra}">${value ?? 0}</b>
    </div>
  `;
}

function renderEventos(data = []) {

  const div = document.getElementById("eventos");
  div.innerHTML = "";

  if (!data.length) {
    div.innerHTML = `<p class="text-gray-400">Sin eventos</p>`;
    return;
  }

  data.forEach(e => {

    const evento = e?.evento || {};

    div.innerHTML += `
      <div class="bg-gray-800 border border-white/10 p-5 rounded-2xl mb-4">

        <p class="text-2xl font-bold text-purple-400">
          ${evento.nombre || "Evento"}
        </p>

        <div class="mt-4 space-y-2 text-gray-300">

          <p>🎟️ Ventas: ${e.ventas || 0}</p>
          <p>🎫 Tickets: ${e.tickets || 0}</p>
          <p>✅ Usados: ${e.usados || 0}</p>

        </div>

      </div>
    `;
  });
}

function renderTickets(data = []) {

  const div = document.getElementById("tickets");
  div.innerHTML = "";

  if (!data.length) {
    div.innerHTML = `<p class="text-gray-400">Sin tickets</p>`;
    return;
  }

  data.forEach(t => {

    div.innerHTML += `
      <div class="bg-gray-800 border border-white/10 p-4 rounded-2xl mb-3 flex items-center justify-between">

        <div>
          <p class="font-bold text-lg">${t.tipo || "Ticket"}</p>
          <p class="text-gray-400 text-sm">${t._id || ""}</p>
        </div>

        <div class="${t.usado ? "text-red-400" : "text-green-400"} font-bold">
          ${t.usado ? "USADO" : "ACTIVO"}
        </div>

      </div>
    `;
  });
}

cargarTodo();

</script>

</body>
</html>
