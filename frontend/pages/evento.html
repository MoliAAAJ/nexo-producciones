<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Evento - NEXO Tickets</title>

  <link rel="icon" type="image/png" href="/assets/images/branding/favicon.png">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #0f0f12; }
  </style>

</head>

<body class="text-white min-h-screen flex flex-col">

<header class="sticky top-0 z-50 bg-black/70 backdrop-blur border-b border-white/10">

  <div class="max-w-7xl mx-auto px-5 py-4 grid grid-cols-3 items-center">

    <!-- IZQUIERDA -->
    <button
      onclick="window.open('https://nexoesquel.com', '_blank')"
      class="justify-self-start bg-transparent border-0 p-0 hover:opacity-80 hover:scale-105 transform duration-200 transition"
    >
      <img
        src="/assets/images/branding/nexo_logo_transparente.png"
        class="h-14 w-auto"
      />
    </button>

    <!-- CENTRO -->
    <div class="justify-self-center">
      <button
        onclick="abrirFAQ()"
        class="bg-purple-600 hover:bg-purple-700 text-white transition px-5 py-2 rounded-xl text-sm font-semibold"
      >
        Ayuda
      </button>
    </div>

    <!-- DERECHA -->
    <a
      href="/index.html"
      class="justify-self-end text-xl font-extrabold text-purple-400 hover:opacity-80 hover:scale-105 transform duration-200 transition"
    >
      NEXO <span class="text-white">Tickets</span>
    </a>

  </div>

</header>

<main class="flex-1 py-10 px-5">

  <div id="container" class="max-w-6xl mx-auto"></div>

</main>

<footer class="border-t border-white/10 py-6 text-center text-sm text-gray-500">
  © 2026 NEXO Tickets - Todos los derechos reservados
</footer>

<!-- 🧠 MODAL GLOBAL DE AYUDA -->
<div id="faqModal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50 px-5">

  <div class="bg-gray-900 rounded-3xl border border-white/10 max-w-2xl w-full p-8 relative">

    <button onclick="cerrarFAQ()" class="absolute top-4 right-4 text-2xl text-gray-400">×</button>

    <h2 class="text-3xl font-bold text-purple-400 mb-6">
      Ayuda
    </h2>

    <div id="faqContent" class="text-gray-300 space-y-3"></div>

  </div>

</div>

<script>

const evento = JSON.parse(localStorage.getItem("evento"));
const container = document.getElementById("container");

/**
 * 🧠 HELP SYSTEM GLOBAL
 */
const HELP = {

  evento: `
    <p>🎟️ Estás en la página del evento.</p>
    <ul>
      <li>Seleccioná “Quiero asistir” para comprar</li>
      <li>El stock es limitado</li>
      <li>Si el evento está cerrado o finalizado no podrás comprar</li>
    </ul>
  `,

  index: `
    <p>📅 Lista de eventos disponibles.</p>
    <ul>
      <li>Ver eventos activos y futuros</li>
      <li>Eventos finalizados no permiten compra</li>
      <li>Click en un evento para entrar</li>
    </ul>
  `,

  checkout: `
    <p>💳 Estás en el checkout.</p>
    <ul>
      <li>Completá tus datos personales</li>
      <li>Podés usar código de descuento</li>
      <li>Serás redirigido a MercadoPago</li>
    </ul>
  `
};

/**
 * 🖼️ IMAGEN SAFE
 */
function fixImage(path) {
  if (!path) return "/assets/images/events/nexo_back.jpg";
  if (path.startsWith("http")) return path;
  if (path.startsWith("/assets")) return path;
  return "/assets/images/events/" + path;
}

/**
 * 🧠 ESTADO EVENTO
 */
function estadoEvento(evento) {
  if (evento.estado === "cerrado") return "cerrado";
  if (evento.estado === "agotado") return "agotado";
  if (evento.estado === "finalizado") return "finalizado";
  return "activo";
}

/**
 * 🚨 RENDER
 */
if (!evento) {

  container.innerHTML = `
    <div class="text-center text-red-400 text-2xl">
      Evento no encontrado
    </div>
  `;

} else {

  const fecha = new Date(evento.fecha).toLocaleDateString("es-AR");

  const entrada = evento.entradas?.[0];
  const precio = entrada?.precio || 0;

  const estado = estadoEvento(evento);

  let botonHTML = "";

  if (estado === "activo") {

    botonHTML = `
      <button
        onclick="comprar()"
        class="mt-10 w-full bg-purple-600 hover:bg-purple-700 transition py-5 rounded-2xl font-bold text-xl"
      >
        Quiero asistir
      </button>
    `;

  } else if (estado === "cerrado") {

    botonHTML = `
      <div class="mt-10 w-full bg-red-600/20 text-red-400 py-5 rounded-2xl font-bold text-center">
        🚫 Ventas online cerradas
      </div>
    `;

  } else if (estado === "agotado") {

    botonHTML = `
      <div class="mt-10 w-full bg-yellow-600/20 text-yellow-300 py-5 rounded-2xl font-bold text-center">
        🎟 Entradas agotadas
      </div>
    `;

  } else {

    botonHTML = `
      <div class="mt-10 w-full bg-gray-700/30 text-gray-400 py-5 rounded-2xl font-bold text-center">
        📅 Evento finalizado
      </div>
    `;
  }

  container.innerHTML = `
    <div class="grid lg:grid-cols-2 gap-10">

      <img 
        src="${fixImage(evento.imagen)}" 
        class="w-full h-[500px] object-cover rounded-3xl"
      />

      <div>

        <span class="bg-purple-600 px-4 py-2 rounded-full text-sm">
          ${evento.categoria || "Evento"}
        </span>

        <h1 class="text-5xl font-extrabold mt-5">
          ${evento.nombre}
        </h1>

        <p class="mt-6 text-gray-300">
          ${evento.descripcion || "Próximamente más información sobre este evento."}
        </p>

        <div class="mt-6 text-gray-400 space-y-2">

          <div>📅 ${fecha}</div>

          <div>
            🕒 ${
              evento.fecha
                ? new Date(evento.fecha).toLocaleTimeString("es-AR", {
                    hour: "2-digit",
                    minute: "2-digit",
                    hour12: false
                  })
                : "Horario a confirmar"
            }
          </div>

          <div>
            📍 ${evento.lugar || "Lugar a confirmar"}
            📌 ${evento.direccion || ""}
            🌎 ${evento.localidad || ""}
          </div>

        </div>

        <div class="mt-8">
          <p class="text-gray-500 text-sm uppercase tracking-widest">
            Entradas desde
          </p>

          <h2 class="text-3xl font-bold text-purple-400 mt-1">
            $${precio}
          </h2>
        </div>

        ${botonHTML}

      </div>

    </div>
  `;
}

/**
 * 🎟️ COMPRA
 */
function comprar() {

  const entrada = evento?.entradas?.[0];

  localStorage.setItem("orden_temp", JSON.stringify({
    eventoId: evento._id,
    eventoNombre: evento.nombre,
    tipo: "General",
    precio: entrada?.precio || 0,
    cantidad: 1
  }));

  window.location.href = "/pages/checkout.html";
}

/**
 * 🧠 HELP SYSTEM
 */
function abrirFAQ() {

  const path = window.location.pathname;

  let page = "evento";

  if (path.includes("index")) page = "index";
  if (path.includes("checkout")) page = "checkout";

  document.getElementById("faqContent").innerHTML =
    HELP[page] || HELP.evento;

  const modal = document.getElementById("faqModal");
  modal.classList.remove("hidden");
  modal.classList.add("flex");
}

function cerrarFAQ() {

  const modal = document.getElementById("faqModal");
  modal.classList.add("hidden");
  modal.classList.remove("flex");
}

</script>

</body>
</html>
