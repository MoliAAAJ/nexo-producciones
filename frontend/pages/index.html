<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>NEXO Tickets</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    * { font-family: 'Inter', sans-serif; }
    html { scroll-behavior: smooth; }
    body { background: #0f0f12; }

    .evento-card:hover img {
      transform: scale(1.05);
    }
  </style>

</head>

<body class="text-white min-h-screen flex flex-col">

  <header class="sticky top-0 z-50 bg-black/70 backdrop-blur border-b border-white/10">

    <div class="max-w-7xl mx-auto px-5 py-4 flex items-center justify-between">

      <!-- FIX IMAGEN LOGO -->
      <img src="/assets/images/branding/nexo_logo_transparente.png" class="h-16 w-auto" />

      <h1 class="text-xl font-extrabold text-purple-400">
        NEXO <span class="text-white">Tickets</span>
      </h1>

    </div>

  </header>

  <section class="max-w-7xl mx-auto px-5 py-10">

    <h2 class="text-4xl font-bold mb-6">Próximos eventos</h2>

    <p id="cantidadEventos" class="text-gray-400 mb-6"></p>

    <div id="eventosContainer" class="grid md:grid-cols-2 xl:grid-cols-3 gap-8"></div>

  </section>

<script>

const API = window.location.origin;
let eventos = [];
let categoriaActual = "Todos";

async function cargarEventos() {

  try {

    const res = await fetch(`${API}/eventos`);
    eventos = await res.json();

    render(eventos);

  } catch (err) {

    document.getElementById("eventosContainer").innerHTML =
      `<p class="text-red-400">Error cargando eventos</p>`;

  }
}

function render(lista) {

  const cont = document.getElementById("eventosContainer");
  const cantidad = document.getElementById("cantidadEventos");

  if (!cont) return;

  cantidad.innerText = `${lista.length} eventos disponibles`;

  cont.innerHTML = "";

  lista.forEach(ev => {

    const img = ev.imagen?.startsWith("http")
      ? ev.imagen
      : `/assets/images/events/${ev.imagen}`;

    cont.innerHTML += `
      <div class="bg-gray-900 rounded-3xl overflow-hidden border border-white/10">

        <img src="${img}" class="w-full h-64 object-cover"/>

        <div class="p-5">

          <h3 class="text-2xl font-bold text-purple-300">
            ${ev.nombre}
          </h3>

          <p class="text-gray-400 mt-2">
            ${ev.lugar || ""}
          </p>

          <button
            onclick='verEvento("${ev._id}")'
            class="mt-5 w-full bg-purple-600 py-3 rounded-xl font-bold"
          >
            Ver evento
          </button>

        </div>

      </div>
    `;

  });
}

function verEvento(id) {

  const evento = eventos.find(e => e._id === id);

  localStorage.setItem("evento", JSON.stringify(evento));

  window.location.href = "/pages/evento.html";
}

cargarEventos();

</script>

</body>
</html>
