<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>NEXO Tickets</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    * { font-family: 'Inter', sans-serif; }
    html { scroll-behavior: smooth; }
    body { background: #0f0f12; }
  </style>

</head>

<header class="sticky top-0 z-50 bg-black/70 backdrop-blur border-b border-white/10">

  <div class="max-w-7xl mx-auto px-5 py-4 grid grid-cols-3 items-center">

    <!-- IZQUIERDA -->
    <img src="/assets/images/branding/nexo_logo_transparente.png" class="h-14 w-auto justify-self-start"/>

    <!-- CENTRO -->
    <div class="justify-self-center">
      <button onclick="abrirFAQ()" class="bg-purple-600 hover:bg-purple-700 px-5 py-2 rounded-xl text-sm font-semibold">
        Ayuda
      </button>
    </div>

    <!-- DERECHA -->
    <h1 class="justify-self-end text-xl font-extrabold text-purple-400">
      NEXO <span class="text-white">Tickets</span>
    </h1>

  </div>

</header>

<section class="max-w-7xl mx-auto px-5 py-10">

  <!-- HERO -->
  <div class="mb-10 text-center">
    <h1 class="text-5xl md:text-6xl font-extrabold text-white leading-tight">
      Bienvenido a <span class="text-purple-400">NEXO Tickets</span>
    </h1>

    <p class="text-gray-400 text-lg mt-4">
      Boletería virtual para eventos, fiestas y espectáculos artísticos
    </p>
  </div>

  <h2 class="text-4xl font-bold mb-6 text-white">
    Próximos eventos
  </h2>

  <p id="cantidadEventos" class="text-gray-400 mb-6"></p>

  <div id="eventosContainer" class="grid md:grid-cols-2 xl:grid-cols-3 gap-8"></div>

</section>

<!-- FAQ -->
<div id="faqModal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50 px-5">

  <div class="bg-gray-900 rounded-3xl border border-white/10 max-w-2xl w-full p-8 relative">

    <button onclick="cerrarFAQ()" class="absolute top-4 right-4 text-2xl text-gray-400">×</button>

    <h2 class="text-3xl font-bold text-purple-400 mb-6">Ayuda</h2>

    <p class="text-gray-300">
      En esta pantalla ves todos los eventos disponibles.<br><br>
      👉 Tocá “Ver evento” para entrar o comprar entradas.<br>
      📌 Los eventos finalizados siguen visibles para consulta.
    </p>

  </div>

</div>

<script>

const API = window.location.origin;
let eventos = [];

function abrirFAQ(){
  const m = document.getElementById("faqModal");
  m.classList.remove("hidden");
  m.classList.add("flex");
}

function cerrarFAQ(){
  const m = document.getElementById("faqModal");
  m.classList.add("hidden");
  m.classList.remove("flex");
}

function eventoFinalizado(ev) {
  return new Date(ev.fecha).getTime() < Date.now();
}

function estadoEvento(ev) {

  if (ev.estado === "cerrado") return "cerrado";
  if (ev.estado === "agotado") return "agotado";
  if (ev.estado === "finalizado") return "finalizado";
  if (eventoFinalizado(ev)) return "finalizado";

  return "activo";
}

async function cargarEventos() {

  const res = await fetch(`${API}/eventos`);
  eventos = await res.json();
  render(eventos);
}

function render(lista) {

  const cont = document.getElementById("eventosContainer");
  const cantidad = document.getElementById("cantidadEventos");

  cantidad.innerText = `${lista.length} eventos disponibles`;

  cont.innerHTML = "";

  lista.forEach(ev => {

    const estado = estadoEvento(ev);

    cont.innerHTML += `
      <div class="bg-gray-900 rounded-3xl overflow-hidden border border-white/10">

        <img src="/assets/images/events/${ev.imagen}" class="w-full h-64 object-cover"/>

        <div class="p-5">

          <h3 class="text-2xl font-bold text-purple-300">
            ${ev.nombre}
          </h3>

          <p class="text-gray-400 mt-2">
            ${ev.localidad || ""}
          </p>

          <button
            onclick='verEvento("${ev._id}")'
            class="mt-5 w-full bg-purple-600 py-3 rounded-xl font-bold"
          >
            Ver evento
          </button>

        </div>

      </div>
    `;
  });
}

function verEvento(id) {

  const evento = eventos.find(e => e._id === id);
  localStorage.setItem("evento", JSON.stringify(evento));

  window.location.href = "/pages/evento.html";
}

cargarEventos();

</script>

</body>
</html>
