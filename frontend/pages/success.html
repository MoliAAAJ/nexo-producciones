<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Compra confirmada - NEXO</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #0f0f12;
    }
  </style>

</head>

<body class="text-white min-h-screen">

<main class="max-w-5xl mx-auto p-6">

  <div class="text-center mb-10">

    <h1 class="text-5xl font-extrabold text-green-400">
      🎉 Compra confirmada
    </h1>

    <p class="text-gray-400 mt-3 text-lg">
      Tus tickets ya están listos
    </p>

  </div>

  <div id="estado" class="text-center text-yellow-400 text-xl mb-8">
    Cargando tickets...
  </div>

  <div id="eventoBox" class="hidden mb-10"></div>

  <div
    id="ticketsContainer"
    class="grid md:grid-cols-2 gap-6"
  ></div>

</main>

<script type="module">

const API = window.location.origin;

const estado =
  document.getElementById("estado");

const ticketsContainer =
  document.getElementById("ticketsContainer");

const eventoBox =
  document.getElementById("eventoBox");

/**
 * 🔥 GET ORDEN ID
 */
const params =
  new URLSearchParams(window.location.search);

const ordenId =
  params.get("orden_id");

if (!ordenId) {

  estado.innerHTML =
    "❌ Orden no encontrada";

  throw new Error("Missing orden_id");
}

/**
 * 🖼️ NORMALIZAR IMAGEN
 */
function getImagen(img) {

  const fallback =
    "/assets/images/events/nexo_back.jpg";

  if (!img || typeof img !== "string") {
    return fallback;
  }

  if (img.startsWith("http")) {
    return img;
  }

  if (img.startsWith("/assets/")) {
    return img;
  }

  if (!img.includes("/")) {
    return `/assets/images/events/${img}`;
  }

  return fallback;
}

/**
 * 📡 CARGAR ORDEN + WAIT WEBHOOK
 */
async function cargarOrden() {

  let data = null;

  for (let i = 0; i < 20; i++) {

    estado.innerHTML =
      `🎟️ Generando tickets... (${i + 1}/20)`;

    try {

      const res =
        await fetch(`${API}/api/orden/${ordenId}`);

      const json = await res.json();

      if (json?.ok) {

        data = json;

        if (json.tickets?.length) {
          break;
        }
      }

    } catch (err) {
      console.error(err);
    }

    await new Promise(r => setTimeout(r, 1500));
  }

  /**
   * ❌ FAIL
   */
  if (!data?.tickets?.length) {

    estado.innerHTML =
      "❌ Tickets no generados";

    return;
  }

  /**
   * ✅ SUCCESS
   */
  estado.innerHTML =
    "✅ Tickets generados correctamente";

  renderEvento(data.orden);

  renderTickets(data.tickets);
}

/**
 * 🎟️ EVENTO
 */
function renderEvento(orden) {

  if (!orden?.evento_id) return;

  const evento =
    orden.evento_id;

  const imagen =
    getImagen(evento.imagen);

  const fecha =
    new Date(evento.fecha)
      .toLocaleDateString("es-AR");

  const hora =
    evento.hora ||

    new Date(evento.fecha)
      .toLocaleTimeString(
        "es-AR",
        {
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        }
      ) + " hs";

  eventoBox.classList.remove("hidden");

  eventoBox.innerHTML = `

    <div class="bg-gray-900 border border-white/10 rounded-3xl overflow-hidden">

      <img
        src="${imagen}"
        class="w-full h-72 object-cover"
        onerror="this.src='/assets/images/events/nexo_back.jpg'"
      />

      <div class="p-8">

        <h2 class="text-4xl font-extrabold">
          ${evento.nombre}
        </h2>

        <div class="mt-4 space-y-3 text-gray-400">

          <div>
            📅 ${fecha}
          </div>

          <div>
            🕒 ${hora}
          </div>

          <div>
            📍 ${evento.lugar || "Lugar a confirmar"}
          </div>

          <div>
            📌 ${evento.direccion || ""}
          </div>

          <div>
            🌎 ${evento.localidad || ""}
          </div>

        </div>

      </div>

    </div>
  `;
}

/**
 * 🎫 TICKETS
 */
function renderTickets(tickets) {

  ticketsContainer.innerHTML = "";

  tickets.forEach(t => {

    const card =
      document.createElement("div");

    card.className =
      "bg-gray-900 border border-white/10 rounded-3xl p-6 text-center";

    card.innerHTML = `

      <h3 class="text-2xl font-bold text-purple-400">
        ${t.tipo}
      </h3>

      <p class="text-gray-500 mt-2 text-sm break-all">
        ID: ${t._id}
      </p>

      <img
        src="${t.qr_code}"
        class="w-52 h-52 mx-auto mt-6 bg-white p-3 rounded-2xl"
      />

      <button
        onclick="descargarPDF('${t._id}')"
        class="mt-6 w-full bg-purple-600 hover:bg-purple-700 transition py-4 rounded-2xl font-bold"
      >
        Descargar Ticket PDF
      </button>

    `;

    ticketsContainer.appendChild(card);
  });
}

/**
 * 📄 PDF
 */
window.descargarPDF = function(id) {

  window.open(
    `${API}/api/orden/ticket/${id}/pdf`,
    "_blank"
  );
};

cargarOrden();

</script>

</body>
</html>
